# 全局日志配置：控制程序日志输出方式、级别、存储策略
logging:
  # 文件日志配置：将日志持久化存储到文件
  file:
    enable: true          # 是否启用文件日志：true=启用，false=关闭
    level: INFO           # 文件日志级别：INFO（只记录重要信息，不记录调试细节）
    path: logs            # 日志文件存储目录：项目根目录下的 logs 文件夹
    rotation: "10 MB"     # 日志文件滚动策略：单个文件最大 10MB，超过自动切分新文件
    retention: "7 days"   # 日志保留策略：只保留最近 7 天的日志，自动清理过期文件
  # 控制台日志配置：程序运行时在终端/IDE 显示日志
  console:
    enable: true          # 是否启用控制台日志：true=启用，false=关闭
    level: INFO           # 控制台日志级别：INFO（与文件日志保持一致）

# 元数据库配置：存储表结构、元数据信息的 MySQL 库
db_meta:
  host: 192.168.200.10         # 数据库连接地址
  port: 3306              # 数据库端口（MySQL 默认 3306）
  user: atguigu           # 数据库登录用户名
  password: Atguigu.123  # 数据库登录密码
  database: meta         # 元数据库名称

# 数仓数据库配置：存储业务明细、清洗后数据的 MySQL 库
db_dw:
  host: 192.168.200.10         # 数据库连接地址
  port: 3306              # 数据库端口
  user: atguigu           # 数据库登录用户名
  password: Atguigu.123  # 数据库登录密码
  database: dw           # 数据仓库库名

# 向量数据库 Qdrant 配置：存储文本向量，用于相似度检索
qdrant:
  host: 192.168.200.10         # Qdrant 服务地址
  port: 6333              # Qdrant 默认端口 6333
  embedding_size: 1024    # 向量维度：与嵌入模型输出维度保持一致（1024 维）

# 嵌入模型服务配置：将文本转为向量的模型服务
embedding:
  host: 192.168.200.10         # 嵌入模型服务地址
  port: 8081              # 模型服务端口
  model: BAAI/bge-large-zh-v1.5  # 使用的嵌入模型名称（中文大模型）

# 搜索引擎 Elasticsearch 配置：用于全文检索、快速查询
es:
  host: 192.168.200.10         # ES 服务地址
  port: 9200              # ES 默认端口 9200
  index_name: data_agent  # ES 索引名称（相当于数据库表）

# 大模型 LLM 配置：对话、理解、生成文本的 AI 模型
llm:
  model_name: deepseek-v4-flash  # 使用的大模型名称
  api_key: sk-bff12f1660b04ae08b26d3f4be214696 # 大模型 API 密钥（需替换为真实密钥）
  base_url: https://api.deepseek.com